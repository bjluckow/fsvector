services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fsvector
      POSTGRES_USER: fsvector
      POSTGRES_PASSWORD: fsvector
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fsvector"]
      interval: 5s
      timeout: 3s
      retries: 5

  convertsvc:
    build: services/convertsvc
    ports:
      - "8101:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  embedsvc-text:
    build: services/embedsvc
    environment:
      EMBED_MODEL: ${TEXT_EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8100:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  embedsvc-image:
    build: services/embedsvc
    environment:
      EMBED_MODEL: ${IMAGE_EMBED_MODEL:-clip-ViT-B-32}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8200:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
      
  fsvectord:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: fsvectord
    volumes:
      - ${SOURCE_DIR:-/tmp/fsvector-source}:/data/source:ro
    environment:
      DATABASE_URL: postgres://fsvector:fsvector@postgres:5432/fsvector
      TEXT_EMBEDSVC_URL: http://embedsvc-text:8000
      IMAGE_EMBEDSVC_URL: http://embedsvc-image:8000
      CONVERTSVC_URL: http://convertsvc:8001
      WATCH_PATH: /data/source
      TEXT_EMBED_MODEL: ${TEXT_EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      IMAGE_EMBED_MODEL: ${IMAGE_EMBED_MODEL:-clip-ViT-B-32}
      SOURCE: ${SOURCE:-local}
    depends_on:
      postgres:
        condition: service_healthy
      convertsvc:
        condition: service_healthy
      embedsvc-text:
        condition: service_healthy
      embedsvc-image:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  hf-cache:
